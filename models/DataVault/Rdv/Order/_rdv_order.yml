version: 2
 
models:
 
############### rdv_order_h
  - name: rdv_order_h
    description: '{{ doc("rdv_order_h") }}'
    columns:
      - name: hk_order_h
        description: '{{ doc("stg_tpch_sf1_orders_hk_order_h") }}'
        tests:
          - unique
          - not_null
      - name: order_id
        description: '{{ doc("rdv_order_h_order_id") }}'
        tests:
          - not_null
      - name: ldts
        description: '{{ doc("ldts") }}'
        tests:
          - not_null
      - name: rsrc
        description: '{{ doc("rsrc") }}'
        tests:
          - not_null
 
############### rdv_order_customer_l
  - name: rdv_order_customer_l
    description: '{{ doc("rdv_order_customer_l") }}'
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hk_order_customer_l
              - ldts
    columns:
      - name: hk_order_customer_l
        description: '{{ doc("stg_tpch_sf1_orders_hk_order_customer_l") }}'
        tests:
          - not_null
      - name: hk_order_h
        description: '{{ doc("stg_tpch_sf1_orders_hk_order_h") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('rdv_order_h')
                field: hk_order_h
      - name: hk_customer_h
        description: '{{ doc("stg_tpch_sf1_orders_hk_customer_h") }}'
