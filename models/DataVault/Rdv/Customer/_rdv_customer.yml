version: 2

models:
  
############### rdv_customer_h
  - name: rdv_customer_h
    description: '{{ doc("rdv_customer_h") }}'
    columns:
      - name: hk_customer_h
        description: '{{ doc("stg_tpch_sf1_customer_hk_customer_h") }}'
        tests:
          - unique
          - not_null
      - name: customer_id
        description: '{{ doc("rdv_customer_h_customer_id") }}'
        tests:
          - not_null
      - name: ldts
        description: '{{ doc("ldts") }}'
        tests:
          - not_null
      - name: rsrc
        description: '{{ doc("rsrc") }}'
        tests:
          - not_null

############### rdv_customer_tpch_s_0
  - name: rdv_customer_tpch_s_0
    description: '{{ doc("rdv_customer_tpch_s_0") }}'
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: 
            - hk_customer_h
            - ldts
    columns:
      - name: hk_customer_h
        description: '{{ doc("stg_tpch_sf1_customer_hk_customer_h") }}'
        tests:
          - not_null
          - relationships:
              field: hk_customer_h
              to: ref('rdv_customer_h')
      - name: hd_customer_tpch_s
        description: '{{ doc("stg_tpch_sf1_customer_hd_customer_tpch_s") }}'
        tests:
          - not_null
      - name: ldts
        description: '{{ doc("ldts") }}'
        tests:
          - not_null
      - name: rsrc
        description: '{{ doc("rsrc") }}'
        tests:
          - not_null
      - name: c_name
        description: '{{ doc("tpch_sf1_customer_c_name") }}'
      - name: c_address
        description: '{{ doc("tpch_sf1_customer_c_address") }}'
      - name: c_phone
        description: '{{ doc("tpch_sf1_customer_c_phone") }}'
      - name: c_mktsegment
        description: '{{ doc("tpch_sf1_customer_c_mktsegment") }}'

############### rdv_customer_tpch_s
  - name: rdv_customer_tpch_s
    description: '{{ doc("rdv_customer_tpch_s") }}'
    columns:
      - name: hk_customer_h
        description: '{{ doc("stg_tpch_sf1_customer_hk_customer_h") }}'
      - name: hd_customer_tpch_s
        description: '{{ doc("stg_tpch_sf1_customer_hd_customer_tpch_s") }}'
      - name: ldts
        description: '{{ doc("ldts") }}'
      - name: rsrc
        description: '{{ doc("rsrc") }}'
      - name: ledts
        description: '{{ doc("ledts") }}'
      - name: is_current
        description: '{{ doc("is_current") }}'
      - name: c_name
        description: '{{ doc("tpch_sf1_customer_c_name") }}'
      - name: c_address
        description: '{{ doc("tpch_sf1_customer_c_address") }}'
      - name: c_phone
        description: '{{ doc("tpch_sf1_customer_c_phone") }}'
      - name: c_mktsegment
        description: '{{ doc("tpch_sf1_customer_c_mktsegment") }}'

############### rdv_customer_country_l
  - name: rdv_customer_country_l
    description: '{{ doc("rdv_customer_country_l") }}'
    columns:
      - name: hk_customer_country_l
        description: '{{ doc("stg_tpch_sf1_customer_hk_customer_country_l") }}'
        tests:
          - unique
          - not_null
      - name: hk_customer_h
        description: '{{ doc("stg_tpch_sf1_customer_hk_customer_h") }}'
        tests:
          - not_null
          - relationships:
              field: hk_customer_h
              to: ref('rdv_customer_h')
      - name: hk_country_h
        description: '{{ doc("stg_tpch_sf1_customer_hk_country_h") }}'
        tests:
          - not_null
          - relationships:
              field: hk_country_h
              to: ref('rdv_country_h')
      - name: ldts
        description: '{{ doc("ldts") }}'
        tests:
          - not_null
      - name: rsrc
        description: '{{ doc("rsrc") }}'
        tests:
          - not_null