version: 2

models:
############### rdv_lineitem_l
  - name: rdv_lineitem_l
    description: '{{ doc("rdv_lineitem_l") }}'
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - hk_lineitem_l
              - ldts
    columns:
      - name: hk_lineitem_l
        description: '{{ doc("stg_tpch_sf1_lineitem_hk_lineitem_l") }}'
        tests:
          - not_null
      - name: hk_order_h
        description: '{{ doc("stg_tpch_sf1_lineitem_hk_order_h") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('rdv_order_h')
                field: hk_order_h
      - name: hk_part_h
        description: '{{ doc("stg_tpch_sf1_lineitem_hk_part_h") }}'
        tests:
          - not_null
      - name: hk_supplier_h
        description: '{{ doc("stg_tpch_sf1_lineitem_hk_supplier_h") }}'
        tests:
          - not_null
      - name: ldts
        description: '{{ doc("ldts") }}'
        tests:
          - not_null
      - name: rsrc
        description: '{{ doc("rsrc") }}'
        tests:
          - not_null
 
